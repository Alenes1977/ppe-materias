  animation-name: fa-spin;
  animation-direction: var(--fa-animation-direction, normal);
  animation-duration: var(--fa-animation-duration, 1s);
  animation-iteration-count: var(--fa-animation-iteration-count, infinite);
  animation-timing-function: var(--fa-animation-timing, steps(8));
}

@media (prefers-reduced-motion: reduce) {
  .fa-beat,
.fa-bounce,
.fa-fade,
.fa-beat-fade,
.fa-flip,
.fa-pulse,
.fa-shake,
.fa-spin,
.fa-spin-pulse {
    animation-delay: -1ms;
    animation-duration: 1ms;
    animation-iteration-count: 1;
    transition-delay: 0s;
    transition-duration: 0s;
  }
}
@keyframes fa-beat {
  0%, 90% {
    transform: scale(1);
  }
  45% {
    transform: scale(var(--fa-beat-scale, 1.25));
  }
}
@keyframes fa-bounce {
  0% {
    transform: scale(1, 1) translateY(0);
  }
  10% {
    transform: scale(var(--fa-bounce-start-scale-x, 1.1), var(--fa-bounce-start-scale-y, 0.9)) translateY(0);
  }
  30% {
    transform: scale(var(--fa-bounce-jump-scale-x, 0.9), var(--fa-bounce-jump-scale-y, 1.1)) translateY(var(--fa-bounce-height, -0.5em));
  }
  50% {
    transform: scale(var(--fa-bounce-land-scale-x, 1.05), var(--fa-bounce-land-scale-y, 0.95)) translateY(0);
  }
  57% {
    transform: scale(1, 1) translateY(var(--fa-bounce-rebound, -0.125em));
  }
  64% {
    transform: scale(1, 1) translateY(0);
  }
  100% {
    transform: scale(1, 1) translateY(0);
  }
}
@keyframes fa-fade {
  50% {
    opacity: var(--fa-fade-opacity, 0.4);
  }
}
@keyframes fa-beat-fade {
  0%, 100% {
    opacity: var(--fa-beat-fade-opacity, 0.4);
    transform: scale(1);
  }
  50% {
    opacity: 1;
    transform: scale(var(--fa-beat-fade-scale, 1.125));
  }
}
@keyframes fa-flip {
  50% {
    transform: rotate3d(var(--fa-flip-x, 0), var(--fa-flip-y, 1), var(--fa-flip-z, 0), var(--fa-flip-angle, -180deg));
  }
}
@keyframes fa-shake {
  0% {
    transform: rotate(-15deg);
  }
  4% {
    transform: rotate(15deg);
  }
  8%, 24% {
    transform: rotate(-18deg);
  }
  12%, 28% {
    transform: rotate(18deg);
  }
  16% {
    transform: rotate(-22deg);
  }
  20% {
    transform: rotate(22deg);
  }
  32% {
    transform: rotate(-12deg);
  }
  36% {
    transform: rotate(12deg);
  }
  40%, 100% {
    transform: rotate(0deg);
  }
}
@keyframes fa-spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
.fa-rotate-90 {
  transform: rotate(90deg);
}

.fa-rotate-180 {
  transform: rotate(180deg);
}

.fa-rotate-270 {
  transform: rotate(270deg);
}

.fa-flip-horizontal {
  transform: scale(-1, 1);
}

.fa-flip-vertical {
  transform: scale(1, -1);
}

.fa-flip-both,
.fa-flip-horizontal.fa-flip-vertical {
  transform: scale(-1, -1);
}

.fa-rotate-by {
  transform: rotate(var(--fa-rotate-angle, 0));
}

.fa-stack {
  display: inline-block;
  vertical-align: middle;
  height: 2em;
  position: relative;
  width: 2.5em;
}

.fa-stack-1x,
.fa-stack-2x {
  bottom: 0;
  left: 0;
  margin: auto;
  position: absolute;
  right: 0;
  top: 0;
  z-index: var(--fa-stack-z-index, auto);
}

.svg-inline--fa.fa-stack-1x {
  height: 1em;
  width: 1.25em;
}
.svg-inline--fa.fa-stack-2x {
  height: 2em;
  width: 2.5em;
}

.fa-inverse {
  color: var(--fa-inverse, #fff);
}

.sr-only,
.fa-sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}

.sr-only-focusable:not(:focus),
.fa-sr-only-focusable:not(:focus) {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border-width: 0;
}

.svg-inline--fa .fa-primary {
  fill: var(--fa-primary-color, currentColor);
  opacity: var(--fa-primary-opacity, 1);
}

.svg-inline--fa .fa-secondary {
  fill: var(--fa-secondary-color, currentColor);
  opacity: var(--fa-secondary-opacity, 0.4);
}

.svg-inline--fa.fa-swap-opacity .fa-primary {
  opacity: var(--fa-secondary-opacity, 0.4);
}

.svg-inline--fa.fa-swap-opacity .fa-secondary {
  opacity: var(--fa-primary-opacity, 1);
}

.svg-inline--fa mask .fa-primary,
.svg-inline--fa mask .fa-secondary {
  fill: black;

.REGULAR,fontSize:"0.95rem",lineHeight:1.6},TAG:{fontFamily:P2.ROBOTO,fontWeight:oe.SEMIBOLD,fontSize:"0.85rem",lineHeight:1.5},CAPTION:{fontFamily:P2.ROBOTO,fontWeight:oe.MEDIUM,fontSize:"0.8rem",lineHeight:1.4}},{H1:nu,H2:Ml,H3:le,SUBTITLE:iu,BODY:b1,BODY_SMALL:Ue,TAG:ma,CAPTION:r3}=th,ah={dimensiones:{SABER:{nombre:"(Conocimientos)",definiciones:["Conocimiento 1: Conocimiento multidisciplinar de las conexiones entre las dimensiones sociales, económicas, filosóficas y políticas del mundo actual.","Conocimiento 2: Conocimiento especializado de los conceptos y teorías económicas imprescindibles para analizar y actuar en contextos económicos complejos.","Conocimiento 3: Conocimiento teórico y aplicado de los conceptos y marcos teóricos tanto de la política contemporánea como de las políticas públicas.","Conocimiento 4: Conocimiento integral de los conceptos y teorías tanto filosóficas como sociológicas más relevantes para analizar los problemas intelectuales y sociales que configuran el mundo y las tendencias del presente.","Conocimiento 5: Conocimiento integrado de los principios de la comunicación política, así como de las técnicas para expresar las ideas con precisión y corrección por medio de discursos orales y escritos rigurosos."]},HACER:{nombre:"(Habilidades)",definiciones:["Habilidad 1: Habilidad para desarrollar un pensamiento crítico que fortalece la capacidad de dar razón y justificar las ideas en contextos ideológicos y socioculturales plurales.","Habilidad 2: Habilidad para elaborar y presentar iniciativas creativas e interdisciplinares con el fin de dar respuesta a los retos y desafíos económicos, sociales, intelectuales y políticos de la sociedad actual.","Habilidad 3: Habilidades para realizar un trabajo interactivo, colaborativo y en equipo, así como para trabajar con autonomía, ejercer un liderazgo conciliador y facilitar las negociaciones."]},SER:{nombre:"(Hábitos intelectuales y éticos)",definiciones:["Hábito 1: Hábito de asumir la responsabilidad y el compromiso con la mejora del mundo.","Hábito 2: Hábito de preguntarse por la justicia y por el respeto al ser humano en sus dimensiones sociales, políticas, filosóficas y económicas.","Hábito 3: Hábito de valentía y resiliencia al enfrentarse a los retos complejos que definen la realidad actual.","Hábito 4: Hábito de servicio a la sociedad y altruismo."]}}},lh=JSON.parse('[{"nombre":"Análisis crítico, contextual e interdisciplinar","declaracion":"Capacidad para comprender y abordar problemas sociales, políticos, económicos y filosóficos desde múltiples enfoques, con pensamiento crítico y atención al contexto histórico, cultural e institucional en el que se sitúan.","icon":"faBrain","nombre_abreviado":"Análisis crítico","url":"analisis-critico","niveles":{"Básico":{"resultados_aprendizaje":["RA1","RA2","RA6","RA7"],"metodologias_docentes":["MD1","MD3","MD2"],"sistemas_evaluacion":["SE1","SE3","SE4"],"actividades_formativas":["AF1","AF2","AF3","AF4","AF5"],"orientación_pedagógica":"Se introducen los conceptos teóricos fundamentales de cada disciplina (filosofía, política, economía) mediante clases expositivas y material previo. El aprendizaje se refuerza con debates guiados y ejercicios prácticos para asegurar la comprensión básica, evaluada mediante pruebas y resolución de problemas."},"Medio":{"resultados_aprendizaje":["RA3","RA5","RA9","RA13","RA14"],"metodologias_docentes":["MD2","MD3","MD4","MD5"],"sistemas_evaluacion":["SE3","SE2"],"actividades_formativas":["AF2","AF4","AF5","AF6"],"orientación_pedagógica":"Se fomenta el análisis crítico y la conexión entre disciplinas a través del debate, el estudio de casos y la resolución de retos. Los estudiantes aplican metodologías específicas y aprenden a interpretar datos, evaluándose mediante trabajos dirigidos y la participación activa."},"Avanzado":{"resultados_aprendizaje":["RA19","RA20","RA23"],"metodologias_docentes":["MD4"],"sistemas_evaluacion":["SE2","SE5","SE3","SE6"],"actividades_formativas":["AF2","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Los estudiantes integran los conocimientos de las tres áreas para abordar problemas complejos de forma holística, principalmente a través de la investigación para resolver retos y culminando en el Trabajo Fin de Grado, donde demuestran una comprensión profunda y crítica."}},"progresion":"El desarrollo de este rasgo sigue una progresión clara: primero se obtienen las bases conceptuales de cada disciplina, luego se aprende a analizar y conectar estas perspectivas, y finalmente se logra integrar estos conocimientos para abordar problemas complejos con visión interdisciplinar. Esta capacidad de análisis holístico es uno de los sellos distintivos del graduado en PPE."},{"nombre":"Liderazgo colaborativo y plural","declaracion":"Habilidad para coordinar e inspirar equipos diversos, generando dinámicas inclusivas y orientadas a objetivos comunes.","icon":"faUsers","nombre_abreviado":"Liderazgo colaborativo","url":"liderazgo-colaborativo","niveles":{"Básico":{"resultados_aprendizaje":["RA28"],"metodologias_docentes":["MD5"],"sistemas_evaluacion":["SE3"],"actividades_formativas":["AF2","AF5"],"orientación_pedagógica":"Se introduce al estudiante en la dinámica del trabajo en equipo mediante actividades cooperativas sencillas, donde se practica la escucha activa, el respeto a la diversidad de opiniones y el cumplimiento de responsabilidades individuales."},"Medio":{"resultados_aprendizaje":["RA29"],"metodologias_docentes":["MD5"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF5","AF6"],"orientación_pedagógica":"Se plantean tareas grupales que requieren mayor colaboración para la organización, comunicación y toma de decisiones conjuntas. Se evalúa la capacidad de valorar distintas aportaciones y gestionar desacuerdos básicos en trabajos de equipo."},"Avanzado":{"resultados_aprendizaje":["RA30"],"metodologias_docentes":["MD5","MD4"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF5","AF6"],"orientación_pedagógica":"Los estudiantes asumen roles de liderazgo o facilitación en proyectos o retos complejos en equipo, diseñando dinámicas inclusivas y gestionando activamente la colaboración y los conflictos para alcanzar objetivos ambiciosos."}},"progresion":"La progresión va desde la participación constructiva básica y el respeto en equipos (Básico), pasando por la colaboración activa en la organización de tareas y la gestión de desacuerdos sencillos (Medio), hasta asumir roles de liderazgo, gestionar conflictos complejos y potenciar la inteligencia colectiva en equipos diversos (Avanzado)."},{"nombre":"Pensamiento estratégico y adaptativo","declaracion":"Capacidad para planificar en la incertidumbre, tomar decisiones con visión a largo plazo y adaptarse con resiliencia.","icon":"faChess","nombre_abreviado":"Pensamiento estratégico","url":"pensamiento-estrategico","niveles":{"Básico":{"resultados_aprendizaje":["RA15"],"metodologias_docentes":["MD1","MD3"],"sistemas_evaluacion":["SE1","SE4"],"actividades_formativas":["AF1","AF2","AF3","AF4","AF5"],"orientación_pedagógica":"Se presentan los marcos conceptuales clave (políticos, económicos) para analizar la realidad y entender la racionalidad de los actores, utilizando clases y ejercicios prácticos. Se evalúa la comprensión de estos marcos mediante pruebas y problemas."},"Medio":{"resultados_aprendizaje":["RA17","RA18"],"metodologias_docentes":["MD3","MD4","MD5"],"sistemas_evaluacion":["SE4","SE2","SE1"],"actividades_formativas":["AF2","AF3","AF4","AF5","AF6"],"orientación_pedagógica":"Se profundiza en el manejo de modelos y herramientas de análisis (económicos, de aprendizaje autónomo) aplicándolos a situaciones concretas mediante ejercicios y casos prácticos, evaluando la capacidad de utilizarlos de forma autónoma."},"Avanzado":{"resultados_aprendizaje":["RA26","RA8"],"metodologias_docentes":["MD4"],"sistemas_evaluacion":["SE5","SE6","SE2","SE4","SE3"],"actividades_formativas":["AF2","AF3","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Se enfrentan escenarios complejos y globales que requieren visión a largo plazo y adaptación. Los estudiantes aplican sus conocimientos para resolver problemas profesionales y analizar la coherencia normativa, a menudo en el marco de retos o el TFG."}},"progresion":"Este rasgo se desarrolla partiendo de la comprensión de los marcos conceptuales básicos para analizar la realidad (Básico), avanzando hacia el manejo autónomo de modelos y herramientas de análisis aplicados a situaciones concretas (Medio), y culminando en la capacidad de analizar escenarios complejos y globales, aplicar conocimientos de forma profesional y adaptarse estratégicamente (Avanzado)."},{"nombre":"Comunicación rigurosa y eficaz","declaracion":"Competencia para expresar ideas complejas con claridad, precisión y sentido estratégico, tanto oral como escrito.","icon":"faComments","nombre_abreviado":"Comunicación eficaz","url":"comunicacion-eficaz","niveles":{"Básico":{"resultados_aprendizaje":["RA10"],"metodologias_docentes":["MD2"],"sistemas_evaluacion":["SE3"],"actividades_formativas":["AF2","AF5"],"orientación_pedagógica":"Se practica la habilidad fundamental de transmitir ideas y soluciones de forma clara a diferentes audiencias, principalmente a través de debates guiados y participaciones en seminarios."},"Medio":{"resultados_aprendizaje":["RA12"],"metodologias_docentes":["MD3","MD5"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF5","AF6"],"orientación_pedagógica":"Se desarrollan habilidades de expresión oral y escrita más elaboradas (rigor, orden, creatividad) mediante la preparación y presentación de trabajos en equipo e individuales sobre temas de actualidad."},"Avanzado":{"resultados_aprendizaje":["RA11","RA16"],"metodologias_docentes":["MD4","MD5"],"sistemas_evaluacion":["SE2","SE3","SE6"],"actividades_formativas":["AF2","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Se exige la formulación de argumentos críticos complejos, precisos y bien fundamentados, utilizando recursos especializados. Se valora la capacidad de analizar el rol estratégico de la comunicación en trabajos y debates avanzados."}},"progresion":"La progresión comienza con la habilidad fundamental de transmitir ideas con claridad (Básico), evoluciona hacia una expresión oral y escrita más estructurada, rigurosa y creativa (Medio), y alcanza la capacidad de formular argumentos complejos, precisos y bien fundamentados, utilizando recursos especializados y comprendiendo el rol estratégico de la comunicación (Avanzado)."},{"nombre":"Innovación creativa orientada al impacto","declaracion":"Capacidad de idear, liderar y ejecutar propuestas creativas que generen valor en contextos cambiantes y socialmente relevantes.","icon":"faLightbulb","nombre_abreviado":"Innovación creativa","url":"innovacion-creativa","niveles":{"Básico":{"resultados_aprendizaje":["RA31"],"metodologias_docentes":["MD4","MD5"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF5","AF6"],"orientación_pedagógica":"Se estimula la identificación de problemas en el entorno y la generación inicial de ideas creativas para solucionarlos, a menudo a través de dinámicas cooperativas o retos sencillos."},"Medio":{"resultados_aprendizaje":["RA32"],"metodologias_docentes":["MD4","MD5"],"sistemas_evaluacion":["SE2","SE4"],"actividades_formativas":["AF2","AF3","AF4","AF5","AF6"],"orientación_pedagógica":"Los estudiantes aprenden a desarrollar ideas hasta convertirlas en propuesta estructurada, utilizando metodologías de innovación para analizar su viabilidad e impacto potencial, evaluado mediante trabajos y resolución de casos."},"Avanzado":{"resultados_aprendizaje":["RA33"],"metodologias_docentes":["MD4","MD6"],"sistemas_evaluacion":["SE2","SE5","SE6"],"actividades_formativas":["AF2","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Se enfoca en el diseño completo y la defensa de proyectos innovadores con potencial de impacto real (social, político o económico), integrando la planificación, gestión de riesgos y evaluación, a menudo mediante Aprendizaje-Servicio o el TFG."}},"progresion":"Se inicia estimulando la identificación de problemas y la generación de ideas iniciales (Básico), se avanza aprendiendo a desarrollar esas ideas en propuestas estructuradas y a analizar su viabilidad (Medio), y se culmina con la capacidad de diseñar, planificar y defender proyectos innovadores completos orientados a generar un impacto tangible (Avanzado)."},{"nombre":"Compromiso ético e integridad","declaracion":"Actuar con responsabilidad, honestidad, justicia y respeto, guiando la acción profesional desde principios firmes y coherentes.","icon":"faBalanceScale","nombre_abreviado":"Integridad","url":"integridad","niveles":{"Básico":{"resultados_aprendizaje":["RA21"],"metodologias_docentes":["MD1","MD2"],"sistemas_evaluacion":["SE1","SE3"],"actividades_formativas":["AF1","AF2","AF4","AF5"],"orientación_pedagógica":"Se promueve la reflexión sobre cuestiones éticas fundamentales presentes en diversas manifestaciones culturales y científicas, fomentando la adopción de posturas personales razonadas a través del diálogo y lecturas."},"Medio":{"resultados_aprendizaje":["RA22"],"metodologias_docentes":["MD2","MD4"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF4","AF5","AF6"],"orientación_pedagógica":"Se analiza críticamente las dimensiones éticas y antropológicas implícitas en las teorías y prácticas de la filosofía, política y economía, mediante debates y trabajos basados en retos o dilemas."},"Avanzado":{"resultados_aprendizaje":["RA25"],"metodologias_docentes":["MD4","MD6"],"sistemas_evaluacion":["SE2","SE5","SE6"],"actividades_formativas":["AF2","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Se aborda la reflexión ética en profundidad aplicada a contextos complejos, como la actividad económica histórica o las implicaciones de políticas actuales, a través de trabajos de investigación, proyectos de ApS o el TFG."}},"progresion":"El desarrollo ético parte de la reflexión sobre cuestiones fundamentales y la adopción de posturas razonadas (Básico), progresa hacia el análisis crítico de las dimensiones y presupuestos éticos implícitos en las disciplinas del grado (Medio), y se consolida aplicando una reflexión ética profunda a contextos prácticos y complejos (Avanzado)."},{"nombre":"Vocación transformadora y de servicio a la sociedad","declaracion":"Voluntad y capacidad de generar un impacto positivo en las instituciones y el entorno, desde una actitud de servicio y compromiso con el bien común.","icon":"faHandsHelping","nombre_abreviado":"Vocación de servicio","url":"vocacion-de-servicio","niveles":{"Básico":{"resultados_aprendizaje":["RA4"],"metodologias_docentes":["MD2","MD1"],"sistemas_evaluacion":["SE3"],"actividades_formativas":["AF1","AF2","AF4","AF5"],"orientación_pedagógica":"Se sensibiliza sobre los problemas sociales y las cuestiones filosóficas subyacentes en los debates actuales, utilizando el diálogo y el análisis de textos o noticias."},"Medio":{"resultados_aprendizaje":["RA24"],"metodologias_docentes":["MD4","MD5"],"sistemas_evaluacion":["SE2","SE3"],"actividades_formativas":["AF2","AF4","AF5","AF6"],"orientación_pedagógica":"Se estudian y contrastan diferentes teorías y modelos que explican la organización social, evaluando sus implicaciones para el bien común mediante trabajos y debates basados en retos."},"Avanzado":{"resultados_aprendizaje":["RA27"],"metodologias_docentes":["MD4","MD6"],"sistemas_evaluacion":["SE2","SE5","SE6"],"actividades_formativas":["AF2","AF4","AF5","AF6","AF7","AF8"],"orientación_pedagógica":"Se desarrolla la capacidad de evaluar críticamente el impacto de políticas y prácticas en la sociedad (democracia, equidad, sostenibilidad), aplicando los conocimientos a problemas reales a través de metodologías como ABR, ApS y el TFG."}},"progresion":"Este rasgo se cultiva comenzando por la sensibilización sobre problemas sociales y sus raíces (Básico), avanzando hacia la evaluación y contraste de teorías sobre la organización social y el bien común (Medio), y desarrollando finalmente la capacidad de evaluar críticamente el impacto real de políticas y prácticas en la sociedad, buscando activamente la mejora y la sostenibilidad (Avanzado)."}]'),V2={identidad_profesional:ah,diseño_pedagogico:JSON.parse('{"actividades_formativas":{"icon":"faGraduationCap","items":[{"id":"AF1","nombre":"Asistencia a clases magistrales","descripcion":"Sesiones impartidas por el profesor en el aula sobre contenidos previstos en la guía docente de la asignatura.","nombre_abreviado":"Clases magistrales","icon":"faChalkboardTeacher"},{"id":"AF2","nombre":"Seminarios de discusión y otras actividades presenciales","descripcion":"Sesiones de trabajo coordinadas por el profesor, con la participación de estudiantes y/o invitados y centradas en un apartado concreto de la asignatura.","nombre_abreviado":"Seminarios y actividades presenciales","icon":"faUserFriends"},{"id":"AF3","nombre":"Realización de ejercicios","descripcion":"Trabajo práctico que realizan los alumnos con la guía del profesor con el fin de consolidar los conocimientos prácticos y la dimensión cuantitativa de algunas disciplinas.","nombre_abreviado":"Realización de ejercicios","icon":"faPencilAlt"},{"id":"AF4","nombre":"Tutorías","descripcion":"Asesoramiento personalizado por parte del profesor y recibido por el estudiante.","nombre_abreviado":"Tutorías","icon":"faUserGraduate"},{"id":"AF5","nombre":"Estudio personal","descripcion":"Conjunto de actividades que realiza el estudiante fuera del aula que son requeridas por el profesor para la superación de la asignatura.","nombre_abreviado":"Estudio personal","icon":"faBook"},{"id":"AF6","nombre":"Elaboración de trabajos dirigidos","descripcion":"Realización de trabajos por parte de los estudiantes fuera del aula para el desarrollo y profundización de contenidos de la asignatura.","nombr
